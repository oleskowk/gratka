services:
  phoenix-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${PHOENIX_DB_USER}
      POSTGRES_PASSWORD: ${PHOENIX_DB_PASSWORD}
      POSTGRES_DB: ${PHOENIX_DB_NAME}
    volumes:
      - phoenix-db-data:/var/lib/postgresql/data
    ports:
      - "${PHOENIX_DB_PORT}:5432"

  symfony-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${SYMFONY_DB_USER}
      POSTGRES_PASSWORD: ${SYMFONY_DB_PASSWORD}
      POSTGRES_DB: ${SYMFONY_DB_NAME}
    volumes:
      - symfony-db-data:/var/lib/postgresql/data
    ports:
      - "${SYMFONY_DB_PORT}:5432"

  phoenix:
    build:
      context: ./phoenix-api
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - phoenix-db
    environment:
      DATABASE_URL: ecto://${PHOENIX_DB_USER}:${PHOENIX_DB_PASSWORD}@phoenix-db/${PHOENIX_DB_NAME}
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE}
      PHX_HOST: ${PHOENIX_HOST}
      PORT: ${PHOENIX_PORT}
    ports:
      - "${PHOENIX_PORT}:${PHOENIX_PORT}"
    volumes:
      - ./phoenix-api:/app

  symfony:
    build:
      context: ./symfony-app
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - symfony-db
      - phoenix
    environment:
      APP_ENV: ${SYMFONY_APP_ENV}
      APP_SECRET: ${SYMFONY_APP_SECRET}
      PHOENIX_BASE_URL: ${SYMFONY_PHOENIX_BASE_URL}
      DATABASE_URL: postgres://${SYMFONY_DB_USER}:${SYMFONY_DB_PASSWORD}@symfony-db:5432/${SYMFONY_DB_NAME}
      PHOENIX_ENCRYPTION_KEY: ${SYMFONY_PHOENIX_ENCRYPTION_KEY}
    ports:
      - "${SYMFONY_PORT}:${SYMFONY_PORT}"
    volumes:
      - ./symfony-app:/app

volumes:
  phoenix-db-data:
  symfony-db-data:
